name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: WebTextConverter_Linux_x64
            cmd_pack: "tar -czvf"
            archive_ext: ".tar.gz"
          - os: windows-latest
            artifact_name: WebTextConverter_Windows_x64
            cmd_pack: "7z a -tzip"
            archive_ext: ".zip"
          - os: macos-latest
            artifact_name: WebTextConverter_macOS_arm64
            cmd_pack: "tar -czvf"
            archive_ext: ".tar.gz"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Create release package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE_NAME="${{ matrix.artifact_name }}_${VERSION}"

          mkdir -p "${PACKAGE_NAME}"
          cp -r node_backend static templates "${PACKAGE_NAME}/"
          cp -r assets "${PACKAGE_NAME}/" 2>/dev/null || true
          cp -r example "${PACKAGE_NAME}/" 2>/dev/null || true
          cp README.md LICENSE config.yaml favicon.ico package.json "${PACKAGE_NAME}/"
          cp package-lock.json "${PACKAGE_NAME}/" 2>/dev/null || true

          ${{ matrix.cmd_pack }} "${PACKAGE_NAME}${{ matrix.archive_ext }}" "${PACKAGE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}_${{ steps.version.outputs.VERSION }}${{ matrix.archive_ext }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}_${{ steps.version.outputs.VERSION }}${{ matrix.archive_ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
